name: KillTracker
version: 1.0
main: ru.mc.killtracker.KillTracker
api-version: 1.21
commands:
  kills:
    description: Показать количество убийств игрока
    usage: /kills [ник]
  killtop:
    description: Показать топ убийц
    usage: /killtop [all]
  season:
    description: Завершить сезон и показать итоги (админ)
    usage: /season end
permissions:
  killtracker.admin:
    description: Доступ к админским командам
    default: op
